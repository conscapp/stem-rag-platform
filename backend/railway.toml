# Railway service settings for conscRAG API
# Dashboard: Root Directory = (repo root), Dockerfile path = backend/Dockerfile
# Memory: allocate at least 4 GB (BGE-M3 + FastAPI)

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
