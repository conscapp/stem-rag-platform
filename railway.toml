# Railway: leave Root Directory EMPTY (repository root)
# Hosted embeddings (OpenAI/Voyage): 512MB–1GB RAM is enough

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
